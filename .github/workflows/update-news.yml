name: Update News

on:
  schedule:
    - cron: "0 */3 * * *"  # elke 3 uur
  workflow_dispatch:

concurrency:
  group: update-news
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/build-data.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto update news" || echo "no changes"

      - name: Pull latest changes (rebase)
        run: git pull --rebase origin main

      - name: Push
        run: git push origin main