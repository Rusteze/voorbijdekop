# Cloudflare Worker: digest-cron, aanmeldingen, feedback, rate limits.
# Na eerste deploy: vul database_id en kv id's in, of laat `wrangler d1 create` / `wrangler kv namespace create` uitvoeren.

name = "voorbijdekop-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[triggers]
# Dagelijks 06:00 UTC — pas aan naar gewenste lokale tijd
crons = ["0 6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "voorbijdekop-db"
database_id = "32d5837d-9053-47b9-abdc-0478be906da3"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "583e55783db6455cb37c98682b91b3e2"

[vars]
# Publieke site-URL (links in mails)
SITE_URL = "https://voorbijdekop.nl"
# Worker-API (afmelden / digest / feedback) — zelfde host als NEXT_PUBLIC_* endpoints in Pages
PUBLIC_API_URL = "https://api.voorbijdekop.nl"
# Volledige URL naar stories.json van de statische site
STORIES_JSON_URL = "https://voorbijdekop.nl/data/stories.json"
DIGEST_TOP_N = "10"
# Optioneel: "false" of "0" = identieke-inhoud-skip uit (test); default = overslaan bij zelfde top-slugs
# DIGEST_SKIP_IDENTICAL = "true"
# Max. succesvolle digests per dag (Europe/Amsterdam) / per rol van 7 dagen; 0 = limiet uit
# DIGEST_MAX_PER_DAY = "1"
# DIGEST_MAX_PER_WEEK = "7"
# Max POSTs per IP per uur (per route)
RATE_LIMIT_DIGEST = "20"
RATE_LIMIT_FEEDBACK = "40"

# Secrets via: wrangler secret put RESEND_API_KEY
# - RESEND_API_KEY
# - RESEND_FROM  (bijv. "Voorbijdekop <digest@voorbijdekop.nl>")
# - CRON_SECRET  (optioneel: beveiligt handmatige cron-trigger)
# - WEBHOOK_SECRET (optioneel: Resend webhooks)
